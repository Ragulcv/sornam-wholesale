name: keep-warm

# Pings the app every 5 minutes so the serverless database never goes cold,
# keeping login and page loads fast. Free for public repos.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 25 https://apse1-node-7q4x.vercel.app/api/health || true
